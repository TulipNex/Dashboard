<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulipNex | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #4ade80, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s ease; border-color: #4ade80; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-bottom-color: #4ade80; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================
        // KONFIGURASI LINK GITHUB (Sesuaikan dengan Repo Anda)
        // =========================================================
        const GITHUB_USER = "TulipNex";
        const GITHUB_REPO = "Dashboard";
        const GITHUB_BRANCH = "main"; // Biasanya 'main' atau 'master'
        
        // URL Raw GitHub untuk mengambil database.json
        const RAW_DB_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/database.json`;
        // =========================================================

        const { useState, useEffect } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [phoneNumber, setPhoneNumber] = useState("");
            
            // Data States
            const [userData, setUserData] = useState(null);
            const [market, setMarket] = useState(null);
            const [board, setBoard] = useState(null);

            const fetchData = async (phone) => {
                if (!phone) return setErrorMsg("Harap masukkan nomor WhatsApp!");
                setIsLoading(true);
                setErrorMsg("");
                
                try {
                    // Gunakan cache-buster (?t=...) agar browser selalu mengambil data terbaru dari GitHub
                    const response = await fetch(`${RAW_DB_URL}?t=${new Date().getTime()}`);
                    
                    if (!response.ok) {
                        throw new Error("Gagal mengambil database. Pastikan file database.json sudah di-upload ke GitHub.");
                    }
                    
                    const db = await response.json();
                    
                    // Format nomor untuk mencari di database
                    const cleanPhone = phone.replace(/[^0-9]/g, '') + '@s.whatsapp.net';
                    const user = db.users[cleanPhone];
                    
                    if (!user) {
                        throw new Error("Nomor tidak ditemukan di database bot. Pastikan Anda sudah terdaftar di bot.");
                    }

                    const m = db.settings?.trading || {};
                    const tnxHolders = Object.entries(db.users)
                        .filter(u => (u[1].tulipnex || 0) > 0)
                        .sort((a, b) => (b[1].tulipnex || 0) - (a[1].tulipnex || 0));

                    // Tentukan Role Direksi
                    let role = "Trader Aktif";
                    if (tnxHolders[0]?.[0] === cleanPhone) role = "👑 CEO";
                    else if (tnxHolders[1]?.[0] === cleanPhone) role = "🎩 Komisaris";
                    else if (tnxHolders[2]?.[0] === cleanPhone) role = "👔 Direktur";

                    // Set Data User
                    setUserData({
                        name: user.name || "Player",
                        level: user.level || 0,
                        exp: user.exp || 0,
                        maxExp: (user.level + 1) * 1000,
                        money: user.money || 0,
                        bankDebt: user.bankDebt || 0,
                        role: role,
                        assets: {
                            IVL: user.ivl || 0, LBT: user.lbt || 0, IRC: user.irc || 0,
                            LTN: user.ltn || 0, RSX: user.rsx || 0, TNX: user.tulipnex || 0
                        }
                    });

                    setMarket({
                        prices: m.prices || {},
                        lastUpdate: m.lastMinuteMarker || "-",
                        vault: m.vault || 0
                    });

                    setBoard(tnxHolders.slice(0, 3).map((h, i) => ({
                        name: h[1].name,
                        tnx: h[1].tulipnex,
                        role: i === 0 ? "CEO" : i === 1 ? "Komisaris" : "Direktur"
                    })));

                    setIsLoggedIn(true);
                } catch (err) {
                    setErrorMsg(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-950">
                        <div className="glass p-8 rounded-3xl w-full max-w-md shadow-2xl border-green-500/20">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-black gradient-text tracking-tighter">TULIPNEX</h1>
                                <p className="text-slate-400 text-sm mt-2 font-medium">Cyber-Botanical Exchange Dashboard</p>
                            </div>

                            {errorMsg && (
                                <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl mb-6 text-xs flex items-center gap-2">
                                    <i className="fa-solid fa-circle-exclamation"></i> {errorMsg}
                                </div>
                            )}

                            <div className="space-y-4">
                                <div className="relative">
                                    <i className="fa-brands fa-whatsapp absolute left-4 top-4 text-slate-500"></i>
                                    <input 
                                        type="text" 
                                        placeholder="628xxxxxxxxxx" 
                                        className="w-full bg-slate-900/50 p-4 pl-12 rounded-2xl border border-slate-800 outline-none focus:border-green-500 transition-all text-sm"
                                        value={phoneNumber}
                                        onChange={(e) => setPhoneNumber(e.target.value)}
                                    />
                                </div>
                                <button 
                                    onClick={() => fetchData(phoneNumber)}
                                    className="w-full bg-gradient-to-r from-green-500 to-emerald-600 py-4 rounded-2xl font-bold text-white shadow-lg shadow-green-500/20 hover:scale-[1.02] active:scale-95 transition-all flex justify-center items-center gap-2"
                                >
                                    {isLoading ? <span className="loader w-5 h-5"></span> : "Masuk ke Dashboard"}
                                </button>
                            </div>
                            <p className="text-center text-[10px] text-slate-600 mt-6 uppercase tracking-widest font-bold">Data Terenkripsi & Aman</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 bg-slate-950">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-2xl font-bold gradient-text">TulipNex Live</h1>
                            <p className="text-[10px] text-slate-500 uppercase tracking-widest">Database Sync: GitHub Raw</p>
                        </div>
                        <div className="flex items-center gap-4">
                             <button 
                                onClick={() => fetchData(phoneNumber)}
                                className="glass p-2 px-4 rounded-xl text-xs font-bold hover:bg-slate-800 transition-all"
                            >
                                <i className="fa-solid fa-sync mr-1"></i> Refresh
                            </button>
                            <button 
                                onClick={() => setIsLoggedIn(false)}
                                className="text-xs text-red-400 font-bold hover:underline"
                            >
                                Logout
                            </button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Profile Section */}
                        <div className="lg:col-span-1 space-y-6">
                            <div className="glass p-8 rounded-[2rem] border-green-500/10">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="w-16 h-16 bg-gradient-to-br from-green-400 to-blue-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg">👤</div>
                                    <div>
                                        <h2 className="text-xl font-bold">{userData.name}</h2>
                                        <span className="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full font-bold">{userData.role}</span>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl">
                                        <span className="text-slate-400 text-sm">Tunai</span>
                                        <span className="font-bold">Rp {userData.money.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl">
                                        <span className="text-slate-400 text-sm">Utang</span>
                                        <span className="font-bold text-red-400">Rp {userData.bankDebt.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl">
                                        <span className="text-slate-400 text-sm">Level</span>
                                        <span className="font-bold text-blue-400">Lv {userData.level}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Market & Board Section */}
                        <div className="lg:col-span-2 space-y-6">
                            {/* Market Prices */}
                            <div className="glass p-8 rounded-[2rem]">
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-chart-line text-green-400"></i> Harga Pasar Botani
                                </h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {Object.entries(market.prices).map(([ticker, price]) => (
                                        <div key={ticker} className="bg-slate-900/40 p-5 rounded-3xl border border-slate-800 hover:border-green-500/30 transition-all group">
                                            <p className="text-xs text-slate-500 font-bold mb-1 group-hover:text-green-400">{ticker}</p>
                                            <p className="text-lg font-mono font-bold">Rp {price.toLocaleString('id-ID')}</p>
                                            <div className="mt-3 pt-3 border-t border-slate-800 flex justify-between items-center">
                                                <span className="text-[10px] text-slate-600 font-bold uppercase">Milik Anda</span>
                                                <span className="text-xs font-bold text-blue-400">{userData.assets[ticker]}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Board Section */}
                            <div className="glass p-8 rounded-[2rem]">
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-crown text-yellow-500"></i> Dewan Direksi TulipNex
                                </h3>
                                <div className="space-y-3">
                                    {board.map((d, i) => (
                                        <div key={i} className="flex justify-between items-center p-4 bg-slate-900/40 rounded-2xl border border-slate-800">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm ${i === 0 ? 'bg-yellow-500/20 text-yellow-500' : 'bg-slate-800 text-slate-400'}`}>
                                                    {i + 1}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm">{d.name}</p>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase">{d.role}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-sm font-mono font-bold text-indigo-400">{d.tnx.toLocaleString()} TNX</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
