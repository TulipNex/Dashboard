<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulipNex | Live Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Animasi Refresh */
        .sync-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Progress bar refresh */
        .progress-container { width: 100%; height: 2px; background: rgba(255,255,255,0.05); position: fixed; top: 0; left: 0; z-index: 100; }
        .progress-bar { height: 100%; background: #10b981; transition: width 0.3s ease; }
        
        .card-hover:hover { transform: translateY(-4px); border-color: rgba(16, 185, 129, 0.3); }
        .market-card { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const GITHUB_BASE = "https://raw.githubusercontent.com/TulipNex/Dashboard/main";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [phoneNumber, setPhoneNumber] = useState("");
            const [userData, setUserData] = useState(null);
            const [market, setMarket] = useState({ prices: {} });
            const [directors, setDirectors] = useState([]);
            const [countdown, setCountdown] = useState(60);
            const [lastSyncTime, setLastSyncTime] = useState("");

            // 1. Fungsi Sinkronisasi Market (Cepat)
            const syncMarket = useCallback(async () => {
                setIsSyncing(true);
                try {
                    const res = await fetch(`${GITHUB_BASE}/market.json?t=${Date.now()}`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    setMarket(data);
                    setDirectors(data.directors || []);
                    setLastSyncTime(new Date().toLocaleTimeString());
                    setCountdown(60);
                } catch (e) {
                    console.error("Gagal sinkronisasi market.");
                }
                setIsSyncing(false);
            }, []);

            // 2. Fungsi Sinkronisasi Total (Profil + Market)
            const fullSync = async () => {
                if (!phoneNumber) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${GITHUB_BASE}/database.json?t=${Date.now()}`);
                    const db = await res.json();
                    const jid = phoneNumber.replace(/[^0-9]/g, '') + '@s.whatsapp.net';
                    const user = db.users[jid];

                    if (user) {
                        setUserData(user);
                        await syncMarket(); // Update harga juga
                    }
                } catch (e) {
                    console.error("Gagal sinkronisasi data profil.");
                }
                setIsSyncing(false);
            };

            // 3. Handle Login
            const handleLogin = async (e) => {
                e.preventDefault();
                if (!phoneNumber) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${GITHUB_BASE}/database.json?t=${Date.now()}`);
                    const db = await res.json();
                    const jid = phoneNumber.replace(/[^0-9]/g, '') + '@s.whatsapp.net';
                    const user = db.users[jid];

                    if (!user) throw new Error("Nomor tidak terdaftar!");

                    setUserData(user);
                    await syncMarket();
                    setIsLoggedIn(true);
                } catch (e) {
                    alert(e.message);
                }
                setIsSyncing(false);
            };

            // 4. Auto-Refresh Loop
            useEffect(() => {
                let timer;
                if (isLoggedIn) {
                    timer = setInterval(() => {
                        setCountdown(prev => {
                            if (prev <= 1) {
                                syncMarket();
                                return 60;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [isLoggedIn, syncMarket]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
                            <h1 className="text-4xl font-black mb-2 text-center gradient-text tracking-tighter">TULIPNEX</h1>
                            <p className="text-slate-500 text-xs text-center font-bold uppercase tracking-widest mb-10">Access Terminal</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:border-green-500 transition-all"
                                    placeholder="Contoh: 628989240628"
                                    value={phoneNumber}
                                    onChange={(e) => setPhoneNumber(e.target.value)}
                                />
                                <button className="w-full bg-green-600 hover:bg-green-500 p-4 rounded-2xl font-bold shadow-lg shadow-green-900/20 transition-all flex justify-center items-center gap-3">
                                    {isSyncing ? <i className="fa-solid fa-circle-notch sync-spin text-xl"></i> : "Sign In"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    {/* Top Progress Bar */}
                    <div className="progress-container">
                        <div className="progress-bar" style={{ width: `${(countdown / 60) * 100}%` }}></div>
                    </div>

                    {/* Navbar */}
                    <nav className="p-6 md:p-10 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/20">
                                <i className="fa-solid fa-bolt-lightning text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter">LIVE TERMINAL</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                    Terhubung • Refresh dalam {countdown} detik
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button 
                                onClick={fullSync}
                                disabled={isSyncing}
                                className="glass px-5 py-3 rounded-xl text-xs font-bold hover:bg-slate-800 transition-all flex items-center gap-2"
                            >
                                <i className={`fa-solid fa-arrows-rotate ${isSyncing ? 'sync-spin text-green-400' : ''}`}></i>
                                Full Sync
                            </button>
                            <button onClick={() => setIsLoggedIn(false)} className="glass px-5 py-3 rounded-xl text-xs font-bold text-red-400 hover:bg-red-500/10 transition-all uppercase">
                                Logout
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar: Profile */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-6 opacity-5 pointer-events-none">
                                    <i className="fa-solid fa-user-shield text-8xl"></i>
                                </div>
                                <h3 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-6">Informasi Akun</h3>
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="w-14 h-14 bg-gradient-to-br from-green-400 to-blue-500 rounded-2xl flex items-center justify-center text-2xl font-bold shadow-lg">
                                        {userData.name[0]}
                                    </div>
                                    <div>
                                        <h2 className="font-bold text-lg leading-tight">{userData.name}</h2>
                                        <p className="text-[10px] text-green-400 font-bold uppercase">Level {userData.level}</p>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <div className="bg-slate-900/60 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                        <span className="text-slate-500 text-xs font-bold uppercase">Saldo</span>
                                        <span className="font-black text-white">Rp {userData.money?.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="bg-slate-900/60 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                        <span className="text-slate-500 text-xs font-bold uppercase">Debt</span>
                                        <span className="font-black text-red-400">Rp {userData.bankDebt?.toLocaleString('id-ID') || 0}</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={fullSync}
                                    className="w-full mt-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest bg-white/5 hover:bg-white/10 transition-all"
                                >
                                    Perbarui Profil
                                </button>
                                <p className="text-[9px] text-center text-slate-600 mt-4 font-bold uppercase tracking-widest">Terakhir Sinkron: {lastSyncTime}</p>
                            </div>
                        </div>

                        {/* Content: Market */}
                        <div className="lg:col-span-8 space-y-8">
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {Object.entries(market.prices).map(([ticker, price]) => (
                                    <div key={ticker} className="glass p-6 rounded-[2rem] market-card card-hover">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">{ticker}</span>
                                            <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                        </div>
                                        <p className="text-xl font-black tracking-tighter">Rp {price.toLocaleString('id-ID')}</p>
                                        <div className="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                                            <span className="text-[9px] text-slate-600 font-bold uppercase">Milik Anda</span>
                                            <span className="text-[11px] font-black text-emerald-400">{userData[ticker.toLowerCase()] || userData.tulipnex || 0}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Directors */}
                            <div className="glass p-8 rounded-[2.5rem]">
                                <h3 className="text-[10px] font-black uppercase tracking-[0.2em] mb-6 text-slate-500">Dewan Direksi TulipNex</h3>
                                <div className="space-y-3">
                                    {directors.map((d, i) => (
                                        <div key={i} className={`flex justify-between items-center p-4 rounded-2xl border ${d.jid === (phoneNumber + '@s.whatsapp.net') ? 'bg-green-500/5 border-green-500/20' : 'bg-slate-900/30 border-white/5'}`}>
                                            <div className="flex items-center gap-4">
                                                <span className="text-[10px] font-black text-slate-600">0{i+1}</span>
                                                <p className="text-sm font-bold">{d.name}</p>
                                            </div>
                                            <span className="font-mono text-xs font-bold text-emerald-400">{d.tnx.toLocaleString()} TNX</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
