<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulipNex | User Profile Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sync-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =========================================================
        // PENGATURAN RAW GITHUB
        // =========================================================
        const GITHUB_BASE = "https://raw.githubusercontent.com/TulipNex/Dashboard/main";
        // =========================================================

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [phoneNumber, setPhoneNumber] = useState("");
            const [userData, setUserData] = useState(null);
            const [lastSyncTime, setLastSyncTime] = useState("");

            // Format waktu untuk Premium
            const msToDate = (ms) => {
                if (ms <= 0) return "Expired";
                let days = Math.floor(ms / (1000 * 60 * 60 * 24));
                let hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
                if (days > 0) return `${days} Hari ${hours} Jam`;
                if (hours > 0) return `${hours} Jam ${minutes} Menit`;
                return `${minutes} Menit`;
            };

            const fullSync = async () => {
                if (!phoneNumber) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${GITHUB_BASE}/database.json?t=${Date.now()}`);
                    if (!res.ok) throw new Error("Gagal mengambil data dari repositori GitHub.");
                    
                    const db = await res.json();
                    const jid = phoneNumber.replace(/[^0-9]/g, '') + '@s.whatsapp.net';
                    const user = db.users[jid];

                    if (!user) throw new Error("Nomor tidak terdaftar di database bot TulipNex.");

                    // Hitung Aset & Networth
                    const p = db.settings?.trading?.prices || {};
                    const assetValue = 
                        (user.ivl || 0) * (p.IVL || 0) + 
                        (user.lbt || 0) * (p.LBT || 0) + 
                        (user.irc || 0) * (p.IRC || 0) + 
                        (user.ltn || 0) * (p.LTN || 0) + 
                        (user.rsx || 0) * (p.RSX || 0) + 
                        (user.tulipnex || 0) * (p.TNX || 0);
                        
                    const bankDebt = user.utangbank || user.bankDebt || user.utang || 0;
                    const networth = (user.money || 0) + assetValue - bankDebt;

                    // Hitung Dewan Direksi
                    const tnxHolders = Object.entries(db.users)
                        .filter(u => (u[1].tulipnex || 0) > 0)
                        .sort((a, b) => (b[1].tulipnex || 0) - (a[1].tulipnex || 0));

                    let tulipRole = "Trader Awam";
                    if (tnxHolders[0]?.[0] === jid) tulipRole = "👑 CEO";
                    else if (tnxHolders[1]?.[0] === jid) tulipRole = "🎩 Komisaris";
                    else if (tnxHolders[2]?.[0] === jid) tulipRole = "👔 Direktur";

                    // Kalkulasi Exp Range 
                    const maxExp = user.level ? user.level * 1000 : 1000;

                    setUserData({
                        name: user.name || "Tidak ada nama",
                        age: user.age > 0 ? user.age : "-",
                        role: user.role || "Newbie ㋡",
                        activeTitle: user.activeTitle || "Belum Ada",
                        pasangan: user.pasangan || "-",
                        level: user.level || 0,
                        exp: user.exp || 0,
                        maxExp: maxExp,
                        limit: user.limit || 0,
                        money: user.money || 0,
                        assetValue: assetValue,
                        networth: networth,
                        tulipRole: tulipRole,
                        bankDebt: bankDebt,
                        registered: user.registered || false,
                        premium: user.premium || false,
                        premiumTime: user.premiumTime || 0,
                        sn: user.sn || "Tidak terdaftar"
                    });

                    setLastSyncTime(new Date().toLocaleTimeString());
                    setIsLoggedIn(true);
                } catch (e) {
                    alert(e.message);
                }
                setIsSyncing(false);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                fullSync();
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-6 opacity-5 pointer-events-none">
                                <i className="fa-solid fa-address-card text-8xl"></i>
                            </div>
                            <h1 className="text-3xl font-black mb-2 text-center gradient-text tracking-tighter">TULIPNEX</h1>
                            <p className="text-slate-500 text-[10px] text-center font-bold uppercase tracking-widest mb-10">Profile Viewer Terminal</p>
                            <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:border-emerald-500 transition-all text-sm"
                                    placeholder="Nomor WA (Cth: 628989...)"
                                    value={phoneNumber}
                                    onChange={(e) => setPhoneNumber(e.target.value)}
                                />
                                <button className="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-2xl font-bold shadow-lg shadow-emerald-900/20 transition-all flex justify-center items-center gap-3">
                                    {isSyncing ? <i className="fa-solid fa-circle-notch sync-spin text-xl"></i> : "Cek Profil"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="p-6 md:p-10 max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 border-b border-white/5 mb-8">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center border border-emerald-500/20">
                                <i className="fa-solid fa-user-astronaut text-emerald-400 text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter">USER PROFILE REPORT</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                    Sync time: {lastSyncTime}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={fullSync} disabled={isSyncing} className="glass px-5 py-3 rounded-xl text-xs font-bold hover:bg-slate-800 transition-all flex items-center gap-2">
                                <i className={`fa-solid fa-arrows-rotate ${isSyncing ? 'sync-spin text-emerald-400' : ''}`}></i>
                                Refresh
                            </button>
                            <button onClick={() => setIsLoggedIn(false)} className="glass px-5 py-3 rounded-xl text-xs font-bold text-red-400 hover:bg-red-500/10 transition-all uppercase">
                                Logout
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto px-6 space-y-8">
                        {/* HEADER IDENTITAS */}
                        <div className="glass p-8 rounded-[2rem] flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                            <div className="w-24 h-24 bg-gradient-to-tr from-emerald-500 to-blue-500 rounded-[2rem] flex items-center justify-center text-4xl font-black shadow-lg shadow-emerald-500/20">
                                {userData.name[0]}
                            </div>
                            <div className="text-center md:text-left flex-1">
                                <h2 className="text-3xl font-black tracking-tight mb-1">{userData.name}</h2>
                                <div className="flex flex-wrap items-center justify-center md:justify-start gap-2 mt-2">
                                    <span className="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] font-bold rounded-full border border-emerald-500/20 uppercase">
                                        Level {userData.level}
                                    </span>
                                    <span className="px-3 py-1 bg-blue-500/10 text-blue-400 text-[10px] font-bold rounded-full border border-blue-500/20 uppercase">
                                        {userData.tulipRole}
                                    </span>
                                    {userData.premium && (
                                        <span className="px-3 py-1 bg-yellow-500/10 text-yellow-500 text-[10px] font-bold rounded-full border border-yellow-500/20 uppercase flex items-center gap-1">
                                            <i className="fa-solid fa-star"></i> Premium
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* GRID INFORMASI 3 KOLOM */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            
                            {/* KARTU 1: STATUS RPG */}
                            <div className="glass p-6 rounded-[2rem] border-t-4 border-emerald-500">
                                <h3 className="text-[11px] font-black uppercase text-emerald-400 tracking-widest mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-scroll"></i> Status RPG
                                </h3>
                                <div className="space-y-4 text-sm">
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Umur</span>
                                        <span className="font-bold">{userData.age} Tahun</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Role</span>
                                        <span className="font-bold">{userData.role}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Gelar</span>
                                        <span className="font-bold">{userData.activeTitle}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Pasangan</span>
                                        <span className="font-bold text-pink-400">{userData.pasangan}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Limit</span>
                                        <span className="font-bold">{userData.limit.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="pt-2">
                                        <div className="flex justify-between text-xs text-slate-400 mb-2">
                                            <span>EXP</span>
                                            <span>{userData.exp.toLocaleString('id-ID')} / {userData.maxExp.toLocaleString('id-ID')}</span>
                                        </div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                                            <div className="bg-emerald-500 h-full" style={{ width: `${Math.min((userData.exp / userData.maxExp) * 100, 100)}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* KARTU 2: TRADER CBE */}
                            <div className="glass p-6 rounded-[2rem] border-t-4 border-blue-500">
                                <h3 className="text-[11px] font-black uppercase text-blue-400 tracking-widest mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-chart-pie"></i> Trader (CBE)
                                </h3>
                                <div className="space-y-4 text-sm">
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Tunai</span>
                                        <span className="font-bold text-emerald-400">Rp {userData.money.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Nilai Aset</span>
                                        <span className="font-bold">Rp {userData.assetValue.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Networth</span>
                                        <span className="font-bold text-white">Rp {userData.networth.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">TulipNex Role</span>
                                        <span className="font-bold">{userData.tulipRole}</span>
                                    </div>
                                    <div className="flex justify-between items-center pt-2">
                                        <span className="text-slate-400">Utang Bank</span>
                                        <span className="font-bold text-red-400">Rp {userData.bankDebt.toLocaleString('id-ID')}</span>
                                    </div>
                                </div>
                            </div>

                            {/* KARTU 3: SYSTEM INFO */}
                            <div className="glass p-6 rounded-[2rem] border-t-4 border-purple-500">
                                <h3 className="text-[11px] font-black uppercase text-purple-400 tracking-widest mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-gear"></i> System Info
                                </h3>
                                <div className="space-y-4 text-sm">
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Pendaftaran</span>
                                        <span className="font-bold">{userData.registered ? '✅ Verified' : '❌ Belum'}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Status Premium</span>
                                        <span className="font-bold">{userData.premium ? '✅ Aktif' : '❌ Non-Premium'}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span className="text-slate-400">Expired Premium</span>
                                        <span className="font-bold text-xs">
                                            {userData.premium && userData.premiumTime > 0 
                                                ? msToDate(userData.premiumTime - Date.now()) 
                                                : (userData.premium ? 'Permanent' : '-')}
                                        </span>
                                    </div>
                                    <div className="pt-2">
                                        <span className="text-slate-400 block mb-2">Serial Number (S/N)</span>
                                        <div className="bg-slate-900/50 p-3 rounded-xl border border-white/5">
                                            <p className="font-mono text-[10px] text-slate-300 break-all leading-relaxed">
                                                {userData.sn}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
