<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulipNex | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #4ade80, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s ease; border-color: #4ade80; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Animasi Loading */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-bottom-color: #4ade80; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================
        // PENGATURAN SERVER BOT (Ubah Sesuai IP VPS/Hosting Anda!)
        // =========================================================
        const SERVER_URL = "http://localhost:3000"; // Contoh: "http://123.45.67.89:3000" atau "https://api.domainanda.com"
        // =========================================================

        const { useState, useEffect } = React;

        function App() {
            // State untuk Login & Koneksi API
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            
            const [phoneNumber, setPhoneNumber] = useState("");

            // Data State
            const [userData, setUserData] = useState(null);
            const [market, setMarket] = useState(null);
            const [board, setBoard] = useState(null);

            // Fungsi untuk Mengambil Data dari Bot (Real-time Fetch)
            const fetchData = async (phone) => {
                setIsLoading(true);
                setErrorMsg("");
                try {
                    // Membersihkan nomor HP dari karakter selain angka
                    const cleanPhone = phone.replace(/[^0-9]/g, '');
                    const endpoint = `${SERVER_URL.replace(/\/$/, '')}/api/dashboard/${cleanPhone}`;
                    
                    const response = await fetch(endpoint);
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || "Gagal menghubungi server");
                    }

                    // Mapping Data User
                    const u = data.user;
                    const m = data.market;
                    const dirs = data.directors;

                    // Kalkulasi Nilai Aset
                    const calculateAssetValue = () => {
                        let total = 0;
                        if(u.ivl) total += u.ivl * (m.prices?.IVL || 0);
                        if(u.lbt) total += u.lbt * (m.prices?.LBT || 0);
                        if(u.irc) total += u.irc * (m.prices?.IRC || 0);
                        if(u.ltn) total += u.ltn * (m.prices?.LTN || 0);
                        if(u.rsx) total += u.rsx * (m.prices?.RSX || 0);
                        if(u.tulipnex) total += u.tulipnex * (m.prices?.TNX || 0);
                        return total;
                    };

                    // Mencari Peran (Role)
                    let currentRole = "Trader Awam";
                    const jid = cleanPhone + '@s.whatsapp.net';
                    if (dirs[0]?.id === jid) currentRole = "👑 CEO";
                    else if (dirs[1]?.id === jid) currentRole = "🎩 Komisaris";
                    else if (dirs[2]?.id === jid) currentRole = "👔 Direktur";

                    setUserData({
                        name: u.name || "Unknown",
                        level: u.level || 0,
                        exp: u.exp || 0,
                        maxExp: (u.level + 1) * 1000, // Simulasi Max Exp
                        limit: u.limit || 0,
                        money: u.money || 0,
                        assetValue: calculateAssetValue(),
                        bankDebt: u.utangbank || 0, // Sesuaikan dengan key database utang Anda
                        tulipRole: currentRole,
                        registered: u.registered || false,
                        premium: u.premium || false,
                        inventory: {
                            wood: u.wood || 0, rock: u.rock || 0, diamond: u.diamond || 0, 
                            emas: u.emas || 0, iron: u.iron || 0, botol: u.botol || 0, sampah: u.sampah || 0
                        },
                        assets: {
                            IVL: u.ivl || 0, LBT: u.lbt || 0, IRC: u.irc || 0, 
                            LTN: u.ltn || 0, RSX: u.rsx || 0, TNX: u.tulipnex || 0
                        }
                    });

                    setMarket({
                        prices: m.prices || {},
                        lastUpdate: m.lastUpdate || "Belum ada data"
                    });

                    setBoard({
                        vault: m.vault || 0,
                        taxRates: m.taxRates || { IVL: 1.5, LBT: 1.5, IRC: 1.5, LTN: 1.5, RSX: 1.5, TNX: 2.5 },
                        pendingProposal: m.pendingProposal,
                        directors: dirs
                    });

                    setIsLoggedIn(true);
                } catch (err) {
                    setErrorMsg(err.message === "Failed to fetch" ? "Koneksi ke bot gagal. Pastikan API bot menyala." : err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if(!phoneNumber) return setErrorMsg("Harap isi Nomor WhatsApp Anda");
                fetchData(phoneNumber);
            };

            // ---- TAMPILAN LOGIN ----
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass p-8 rounded-3xl w-full max-w-md relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 right-0 p-4 opacity-10">
                                <i className="fa-brands fa-envira text-8xl"></i>
                            </div>
                            <div className="text-center mb-8 relative z-10">
                                <h1 className="text-3xl font-bold gradient-text mb-2">TulipNex</h1>
                                <p className="text-slate-400 text-sm">Masuk ke Ekosistem Digital</p>
                            </div>

                            {errorMsg && (
                                <div className="bg-red-500/20 border border-red-500/50 text-red-400 p-3 rounded-xl mb-6 text-sm flex items-start gap-2 animate-pulse">
                                    <i className="fa-solid fa-circle-exclamation mt-0.5"></i> {errorMsg}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-6 relative z-10">
                                <div>
                                    <label className="block text-xs text-slate-400 mb-1 ml-1 font-semibold">Nomor WhatsApp Terdaftar</label>
                                    <div className="relative">
                                        <i className="fa-brands fa-whatsapp absolute left-4 top-3.5 text-slate-500"></i>
                                        <input 
                                            type="text" 
                                            className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all"
                                            value={phoneNumber}
                                            onChange={(e) => setPhoneNumber(e.target.value)}
                                            placeholder="Contoh: 62812345678"
                                            autoComplete="off"
                                        />
                                    </div>
                                    <p className="text-[10px] text-slate-500 mt-2 ml-1"><i className="fa-solid fa-circle-info mr-1"></i>Gunakan format nomor sesuai yang terdaftar di bot (awali dengan kode negara, contoh: 62).</p>
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={isLoading}
                                    className="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-green-500/30 flex justify-center items-center gap-2"
                                >
                                    {isLoading ? <span className="loader w-5 h-5"></span> : <><i className="fa-solid fa-right-to-bracket"></i> Akses Dashboard</>}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Kalkulasi Total Networth
            const networth = userData.money + userData.assetValue - userData.bankDebt;

            // ---- TAMPILAN DASHBOARD ----
            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold gradient-text">TulipNex Dashboard</h1>
                            <p className="text-slate-400 flex items-center gap-2">
                                <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                                Live Data Terhubung
                            </p>
                        </div>
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => fetchData(phoneNumber)}
                                disabled={isLoading}
                                className="glass px-4 py-2 rounded-xl hover:bg-slate-800 transition-colors text-sm flex items-center gap-2"
                            >
                                <i className={`fa-solid fa-rotate-right ${isLoading ? 'animate-spin text-green-400' : ''}`}></i> Refresh
                            </button>
                            <button onClick={() => setIsLoggedIn(false)} className="glass px-4 py-2 rounded-xl hover:bg-red-500/20 hover:text-red-400 hover:border-red-500/50 transition-colors text-sm">
                                Logout <i className="fa-solid fa-right-from-bracket ml-1"></i>
                            </button>
                            <div className="flex items-center gap-3 glass p-2 px-4 rounded-2xl ml-2">
                                <div className="text-right hidden sm:block">
                                    <p className="text-xs text-slate-400 flex items-center justify-end gap-1">
                                        {userData.premium && <i className="fa-solid fa-star text-yellow-400 text-[10px]"></i>}
                                        {userData.tulipRole}
                                    </p>
                                    <p className="font-semibold">{userData.name}</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white font-bold">
                                    {userData.name[0]}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Column 1: Profile & Stats */}
                        <div className="space-y-6">
                            {/* Player Profile & Portfolio */}
                            <div className="glass p-6 rounded-3xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                                    <i className="fa-solid fa-id-card-clip text-8xl"></i>
                                </div>
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-user-astronaut text-green-400"></i> Player Profile
                                </h2>
                                
                                <div className="space-y-4 relative z-10">
                                    <div className="flex justify-between items-center mb-1">
                                        <div className="flex gap-2">
                                            {userData.registered && <span className="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-[10px] rounded-md font-bold border border-blue-500/30">VERIFIED</span>}
                                            {userData.premium && <span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-[10px] rounded-md font-bold border border-yellow-500/30">PREMIUM</span>}
                                        </div>
                                        <span className="font-mono text-green-400 font-bold">Lvl {userData.level}</span>
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between text-xs text-slate-400 mb-1">
                                            <span>EXP</span>
                                            <span>{userData.exp.toLocaleString()} / {userData.maxExp.toLocaleString()}</span>
                                        </div>
                                        <div className="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                            <div className="bg-green-500 h-full" style={{width: `${Math.min((userData.exp/userData.maxExp)*100, 100)}%`}}></div>
                                        </div>
                                    </div>

                                    {/* Portfolio Summary */}
                                    <div className="mt-6 pt-4 border-t border-slate-700/50">
                                        <p className="text-xs text-slate-400 mb-1">Networth (Total Kekayaan)</p>
                                        <p className="text-2xl font-bold text-white mb-4">Rp {networth.toLocaleString('id-ID')}</p>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-800/60 p-3 rounded-xl border border-slate-700/50">
                                                <p className="text-[10px] text-slate-400 mb-1"><i className="fa-solid fa-wallet text-blue-400"></i> Uang Tunai</p>
                                                <p className="text-sm font-semibold">Rp {userData.money.toLocaleString('id-ID')}</p>
                                            </div>
                                            <div className="bg-slate-800/60 p-3 rounded-xl border border-slate-700/50">
                                                <p className="text-[10px] text-slate-400 mb-1"><i className="fa-solid fa-chart-pie text-purple-400"></i> Nilai Aset</p>
                                                <p className="text-sm font-semibold">Rp {userData.assetValue.toLocaleString('id-ID')}</p>
                                            </div>
                                            <div className="bg-slate-800/60 p-3 rounded-xl border border-slate-700/50">
                                                <p className="text-[10px] text-slate-400 mb-1"><i className="fa-solid fa-building-columns text-red-400"></i> Utang Bank</p>
                                                <p className="text-sm font-semibold">{userData.bankDebt > 0 ? `Rp ${userData.bankDebt.toLocaleString('id-ID')}` : '-'}</p>
                                            </div>
                                            <div className="bg-slate-800/60 p-3 rounded-xl border border-slate-700/50">
                                                <p className="text-[10px] text-slate-400 mb-1"><i className="fa-solid fa-bolt text-yellow-400"></i> Limit Harian</p>
                                                <p className="text-sm font-semibold">{userData.limit}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Column 2: Market, Corporate & Inventory */}
                        <div className="lg:col-span-2 space-y-6">
                            
                            {/* Dewan Direksi (Corporate) */}
                            <div className="glass p-6 rounded-3xl border border-indigo-500/30">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <i className="fa-solid fa-landmark text-indigo-400"></i> TulipNex Corporate
                                    </h2>
                                    <span className="text-xs bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30">Dewan Direksi</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-2xl border border-slate-700 flex flex-col justify-center">
                                        <p className="text-xs text-slate-400 mb-1">Brankas Perusahaan (Vault)</p>
                                        <p className="text-xl md:text-2xl font-bold text-green-400 mb-3">
                                            Rp {board.vault.toLocaleString('id-ID')}
                                        </p>
                                        <p className="text-[10px] text-slate-500 border-t border-slate-700 pt-2">
                                            Pajak Penjualan: {board.taxRates.TNX}% (TNX) | {board.taxRates.IVL}% (Lainnya)
                                        </p>
                                    </div>

                                    <div className="md:col-span-2 space-y-3">
                                        {board.directors.map((dir, idx) => (
                                            <div key={idx} className={`flex items-center justify-between bg-slate-800/40 p-3 rounded-xl border ${dir.id === (phoneNumber + '@s.whatsapp.net') ? 'border-green-500/50 shadow-[0_0_10px_rgba(74,222,128,0.2)]' : 'border-slate-700/30'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold
                                                        ${idx === 0 ? 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/50' : 
                                                          idx === 1 ? 'bg-slate-400/20 text-slate-300 border border-slate-400/50' : 
                                                          'bg-orange-500/20 text-orange-400 border border-orange-500/50'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-bold flex items-center gap-2">
                                                            {dir.name}
                                                            {dir.id === (phoneNumber + '@s.whatsapp.net') && <span className="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded uppercase">Anda</span>}
                                                        </p>
                                                        <p className="text-[10px] text-slate-400">{dir.role}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-sm font-bold text-indigo-400">{dir.tnx.toLocaleString()} TNX</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {board.pendingProposal && (
                                    <div className="mt-4 bg-orange-500/10 border border-orange-500/30 p-3 rounded-xl flex items-start gap-3">
                                        <i className="fa-solid fa-triangle-exclamation text-orange-400 mt-0.5"></i>
                                        <div>
                                            <p className="text-xs text-orange-400 font-bold">Usulan Pajak Tertunda</p>
                                            <p className="text-[10px] text-slate-300">CEO mengusulkan pajak {board.pendingProposal.ticker} menjadi {board.pendingProposal.newTax}%. Menunggu persetujuan dewan.</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Market Section */}
                            <div className="glass p-6 rounded-3xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <i className="fa-solid fa-chart-line text-yellow-400"></i> Live Market Prices
                                    </h2>
                                    <span className="text-xs text-slate-500 italic">Data Update: {market.lastUpdate} WITA</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {Object.entries(market.prices).map(([ticker, price]) => (
                                        <div key={ticker} className="bg-slate-800/40 p-4 rounded-2xl card-hover border border-slate-700/50 relative overflow-hidden">
                                            <div className="absolute -bottom-4 -right-2 opacity-[0.03] text-6xl font-black italic select-none pointer-events-none">{ticker}</div>
                                            <div className="flex justify-between items-start mb-2 relative z-10">
                                                <span className={`font-bold ${ticker === 'TNX' ? 'text-indigo-400' : 'text-slate-200'}`}>{ticker}</span>
                                            </div>
                                            <p className="text-lg font-mono font-bold text-white relative z-10">
                                                <span className="text-xs text-slate-500 mr-1">Rp</span> 
                                                {price.toLocaleString('id-ID')}
                                            </p>
                                            <div className="flex justify-between items-center mt-2 relative z-10 border-t border-slate-700/50 pt-2">
                                                <p className="text-[10px] text-slate-400">Aset Dimiliki:</p>
                                                <p className="text-xs font-bold text-blue-400">{userData.assets[ticker] || 0} unit</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Inventory Section */}
                            <div className="glass p-6 rounded-3xl">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-box-open text-orange-400"></i> Resource Inventory
                                </h2>
                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                    {Object.entries(userData.inventory).map(([item, qty]) => (
                                        <div key={item} className="flex flex-col items-center p-3 bg-slate-800/30 rounded-2xl border border-slate-700/30 hover:bg-slate-700/50 transition-colors">
                                            <div className="w-12 h-12 mb-2 flex items-center justify-center bg-slate-700/50 rounded-xl text-xl shadow-inner">
                                                {item === 'diamond' && '💎'}
                                                {item === 'wood' && '🪵'}
                                                {item === 'rock' && '🪨'}
                                                {item === 'emas' && '🥇'}
                                                {item === 'iron' && '⛓️'}
                                                {item === 'botol' && '🍾'}
                                                {item === 'sampah' && '🗑️'}
                                            </div>
                                            <span className="text-[10px] uppercase text-slate-400 font-bold tracking-wider">{item}</span>
                                            <span className="text-sm font-bold text-white">{qty.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="max-w-7xl mx-auto mt-12 text-center text-slate-500 text-sm">
                        <p>© 2026 RTXZY Bot System • Powered by BOTCAHX Framework</p>
                        <div className="flex justify-center gap-4 mt-2">
                            <a href="#" className="hover:text-green-400 transition-colors"><i className="fa-brands fa-github"></i> Source</a>
                            <a href="#" className="hover:text-green-400 transition-colors"><i className="fa-brands fa-whatsapp"></i> Support</a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
